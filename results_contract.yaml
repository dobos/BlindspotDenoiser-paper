claim_chain:
  - claim_id: C1
    evidence_id: sec:results_denoising
    rules_out: |
      The gain is not explained by importing clean training targets (clean-template PCA caps at 55.7), by tuning a conventional smoother (Wavelet BayesShrink caps at 26.6), or by the scalar noise input (blindspot without it already reaches 118 of 122). The supervised clean-target U-Net reaches 154, so the self-supervised blindspot recovers most of the paired-data ceiling at 122 without any clean spectrum; a central-visible control collapses to the noisy-input scale (7.6), so the gain requires the blindspot exclusion.
    scope_limit: |
      Held-out reconstruction test split of 10,000 BOSZ/PFS-like late-type spectra at mag 20.5-22.5 with one independent zero-mean per-pixel noise realization each; clean-template PCA and supervised U-Net are non-deployable references with clean-data access.
  - claim_id: C2
    evidence_id: sec:results_physical
    rules_out: |
      The aggregate reconstruction-S/N gain is not explained by simple continuum filling (Ca II EW errors fall on all three triplet lines; polarity flips drop sharply; O2 window-restricted S/N rises rather than collapsing).
    scope_limit: |
      Continuum-normalized, medium-resolution, late-type BOSZ/PFS-like spectra at magnitude 20.5-22.5 under independent zero-mean per-pixel noise; line measurements use fixed EW windows and a continuum-relative polarity statistic, not absolute spectrophotometry.
  - claim_id: C3
    evidence_id: sec:results_downstream_logg
    rules_out: |
      The downstream gain is not a generic smoothness consequence under the fixed clean-trained log g estimator, because the validation-tuned Savitzky-Golay smoother remains closer to the noisy-input scale and the downstream appendix checks train-size sensitivity.
    scope_limit: |
      Disjoint 5,000-spectrum test partition of the same scope-restricted BOSZ library, evaluated through a LightGBM calibrator trained only on clean spectra and applied without refitting; not a thresholded dwarf-giant classification metric or full stellar-label recovery claim.
residue_signature: |
  After Results, the reader carries: a 16x reconstruction-S/N gain on the selected low-S/N test set; line-preservation diagnostics that argue against simple smoothing or line filling as the dominant explanation; and a fixed clean-trained log g transfer result that improves on noisy and smoothed inputs without reaching the clean-reference row. All three findings are scoped to a continuum-normalized late-type BOSZ/PFS-like simulator with independent per-pixel noise.
